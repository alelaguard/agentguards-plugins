name: Publish Claude plugin to npm

# Publishes claude/ as @agentguards/claude-plugin to the npm registry.
# Trigger manually from the Actions tab ("Run workflow"), or by pushing a
# tag like `claude-v0.2.4`. Requires an NPM_TOKEN repo secret (an npm
# "Automation" access token for an account with @agentguards org publish rights).

on:
  workflow_dispatch: {}
  push:
    tags:
      - "claude-v*"

permissions:
  contents: read
  id-token: write # enables npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Publish
        working-directory: claude
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
