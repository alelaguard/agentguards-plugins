name: Publish Claude plugin to npm

# Publishes claude/ as @agentguards/claude-plugin to the npm registry via
# npm Trusted Publishing (OIDC) — no long-lived NPM_TOKEN is stored anywhere.
# GitHub Actions proves its identity to npm directly, so the only setup is a
# one-time "trusted publisher" link configured on npmjs.com for this package
# (repo: alelaguard/agentguards-plugins, workflow: npm-publish.yml).
#
# Long-lived publish tokens are being deprecated by npm (2FA-bypass GATs lose
# publish rights ~Jan 2027), which is why we use OIDC instead.
#
# Trigger manually from the Actions tab ("Run workflow"), or by pushing a tag
# like `claude-v0.2.4`.

on:
  workflow_dispatch: {}
  push:
    tags:
      - "claude-v*"

permissions:
  contents: read
  id-token: write # required for npm Trusted Publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Upgrade npm (Trusted Publishing needs npm >= 11.5.1)
        run: npm install -g npm@latest
      - name: Publish
        working-directory: claude
        run: npm publish --provenance --access public
